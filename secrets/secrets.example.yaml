# Template for secrets.yaml — shows the expected structure.
#
# To create the real secrets file:
#   1. Update .sops.yaml with your age public key
#   2. Run: sops secrets/secrets.yaml
#   3. Fill in the values below
#   4. Save and exit — sops encrypts automatically
#
# Never commit the decrypted secrets.yaml. Only the encrypted version.

ghcr-token: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
cloudflare-api-token: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
grafana-admin-password: changeme
postgres-exporter-dsn: "postgresql://postgres_exporter:changeme@localhost:5432/postgres?sslmode=disable"

auth-service:
  jwt-secret: your-jwt-signing-secret-here

# Cloudflare Origin CA certificate — use YAML block syntax for multi-line values
# Generate at: Cloudflare → SSL/TLS → Origin Server → Create Certificate
origin-cert-pem: |
    -----BEGIN CERTIFICATE-----
    your-certificate-here
    -----END CERTIFICATE-----
origin-cert-key: |
    -----BEGIN PRIVATE KEY-----
    your-private-key-here
    -----END PRIVATE KEY-----
